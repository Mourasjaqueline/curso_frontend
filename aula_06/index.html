<!DOCTYPE html>
<html lang="pt-BR"> 
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula 06 - Galeria Responsiva</title>
    <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
    <!-- Div que centraliza roda a galera-->
    <div class="gallery"> 
        <h1>Galeria de Viagens</h1>

        <div class="grid">

            <div class="item">
                <img src="./img/img1.jpg" alt="Ubatuba">
                <div class="overlay">Praia</div>
            </div>

            <div class="item">
                <img src="./img/img2.jpg" alt="Praia Grande">
                <div class="overlay">Praia Grande</div>
            </div>

            <div class="item">
                <img src="./img/img3.jpg" alt="Maldivas">
                <div class="overlay">Maldivas</div>
            </div>

            <div class="item">
                <img src="./img/img4.jpg" alt="Praia">
                <div class="overlay">Praia</div>
            </div>

            <div class="item">
                <img src="./img/img5.jpg" alt="Cachoeira">
                <div class="overlay">Cachoeira</div>
            </div>

            <div class="item">
                <img src="./img/img6.jpg" alt="Cachoeira de prata">
                <div class="overlay">Cachoeira de prata</div>
            </div>

        </div>
    </div>

</body>
</html>
